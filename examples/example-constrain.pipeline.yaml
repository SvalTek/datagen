version: 1
name: constrain-types-smoke
description: Constrain DSL coverage example exercising all supported schema node types.
model: qwen2.5:14b
provider: ollama
endpoint: http://localhost:11434/
outputDir: ./output
stages:
  - name: generate_constrain_matrix
    instructions: >
      Generate a single JSON object that exactly matches the constrain schema below.
      Include optional fields in this output so the example demonstrates them in practice.
      Do not add fields outside the declared schema.
      Return valid JSON only.
    constrain:
      type: object
      additionalProperties: false
      shape:
        stringField:
          type: string
          minLength: 3
          maxLength: 20
          pattern: "^[A-Za-z0-9_-]+$"
        boundedNumber:
          type: number
          min: 0
          max: 100
        intNumber:
          type: number
          int: true
          min: 1
          max: 10
        boolField:
          type: boolean
        enumString:
          type: enum
          values: ["alpha", "beta", "gamma"]
        enumMixed:
          type: enum
          values: [1, true, "mixed", null]
        literalField:
          type: literal
          value: "fixed-token"
        tags:
          type: array
          minItems: 2
          maxItems: 4
          items:
            type: string
            minLength: 2
        scores:
          type: array
          minItems: 3
          maxItems: 3
          items:
            type: number
            min: 0
            max: 1
        nestedObject:
          type: object
          additionalProperties: false
          shape:
            id:
              type: string
              pattern: "^id-[0-9]{3}$"
            status:
              type: enum
              values: ["ok", "warn", "error"]
            note:
              type: string
              nullable: true
            maybeFlag:
              type: boolean
              optional: true
        optionalString:
          type: string
          optional: true
        nullableNumber:
          type: number
          nullable: true
        optionalNullableBoolean:
          type: boolean
          optional: true
          nullable: true
